<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ScreenPeekr</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<link id="md-css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-dark.css" />
<style>
  :root {
    --bg:#0d1117; --fg:#c9d1d9; --accent:#58a6ff; --accent-hover:#79c0ff;
    --muted:#8b949e; --border:#30363d; --surface:#161b22; --surface-hover:#21262d;
  }
  [data-theme="light"] {
    --bg:#ffffff; --fg:#24292f; --accent:#2563eb; --accent-hover:#1d4ed8;
    --muted:#6b7280; --border:#d0d7de; --surface:#f6f8fa; --surface-hover:#eaeef2;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--fg); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  header.bar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(13,17,23,0.95);
    backdrop-filter: saturate(180%) blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between;
  }
  [data-theme="light"] header.bar { background: rgba(255,255,255,0.95); }
  .title { font-weight: 700; font-size: 18px; }
  .title a { color:inherit; text-decoration:none; }
  .title small { color: var(--muted); font-weight: 500; margin-left: 8px; font-size: 13px; }
  .actions { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .btn {
    display:inline-flex; align-items:center; gap:8px;
    padding: 9px 16px; border-radius: 8px;
    font-weight: 600; font-size: 14px; text-decoration: none;
    border: 1px solid transparent; cursor:pointer; transition: background .15s, transform .05s;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--accent); color:#fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary { background:var(--surface); color:var(--fg); border-color: var(--border); }
  .btn-secondary:hover { background:var(--surface-hover); }
  .btn[aria-disabled="true"] { opacity:.5; pointer-events:none; }
  .toggle-btn {
    padding: 8px 10px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border);
    color: var(--fg); cursor: pointer; font-size: 16px; line-height: 1;
  }
  .toggle-btn:hover { background: var(--surface-hover); }
  main { max-width: 920px; margin: 0 auto; padding: 32px 20px 80px; }
  .markdown-body { background: transparent; color: var(--fg); }
  #status { color: var(--muted); font-size: 14px; padding: 40px 0; text-align:center; }
</style>
</head>
<body>
<header class="bar">
  <div class="title">
    <a href="https://github.com/hulkingburst/screenpeekr">ScreenPeekr</a>
    <small id="version">loading…</small>
  </div>
  <div class="actions">
    <a id="dl-exe" class="btn btn-primary" aria-disabled="true" href="#">⬇ Download latest .exe</a>
    <a id="dl-src" class="btn btn-secondary" aria-disabled="true" href="#">⬇ Download full source code</a>
    <button id="theme-toggle" class="toggle-btn" title="Toggle light/dark mode">🌙</button>
  </div>
</header>
<main>
  <article id="readme" class="markdown-body"><div id="status">Loading latest README…</div></article>
</main>
<script>
(function(){
  const html = document.documentElement;
  const mdCss = document.getElementById('md-css');
  const toggleBtn = document.getElementById('theme-toggle');
  const STORAGE_KEY = 'screenpeekr-theme';
  const saved = localStorage.getItem(STORAGE_KEY);
  const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  let isDark = saved ? saved === 'dark' : true;
  if (!saved && !prefersDark) { isDark = false; }

  function apply() {
    html.setAttribute('data-theme', isDark ? 'dark' : 'light');
    mdCss.href = `https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown-${isDark ? 'dark' : 'light'}.css`;
    if (toggleBtn) toggleBtn.textContent = isDark ? '🌙' : '☀️';
    if (toggleBtn) toggleBtn.title = isDark ? 'Switch to light mode' : 'Switch to dark mode';
  }

  toggleBtn && toggleBtn.addEventListener('click', () => {
    isDark = !isDark;
    localStorage.setItem(STORAGE_KEY, isDark ? 'dark' : 'light');
    apply();
  });

  apply();
})();
const REPO = "hulkingburst/screenpeekr";

async function init() {
  try {
    const rel = await fetch(`https://api.github.com/repos/${REPO}/releases/latest`).then(r => {
      if (!r.ok) throw new Error("no latest release");
      return r.json();
    });
    document.getElementById("version").textContent = rel.tag_name || "";
    const exe = (rel.assets || []).find(a => /\.exe$/i.test(a.name));
    const exeBtn = document.getElementById("dl-exe");
    if (exe) {
      exeBtn.href = exe.browser_download_url;
      exeBtn.removeAttribute("aria-disabled");
      exeBtn.textContent = `⬇ Download ${exe.name}`;
    } else {
      exeBtn.textContent = "No .exe in latest release";
    }
    const srcBtn = document.getElementById("dl-src");
    srcBtn.href = rel.zipball_url || `https://github.com/${REPO}/archive/refs/tags/${rel.tag_name}.zip`;
    srcBtn.removeAttribute("aria-disabled");
  } catch (e) {
    document.getElementById("version").textContent = "no releases";
    const srcBtn = document.getElementById("dl-src");
    srcBtn.href = `https://github.com/${REPO}/archive/refs/heads/main.zip`;
    srcBtn.removeAttribute("aria-disabled");
  }

  try {
    const repo = await fetch(`https://api.github.com/repos/${REPO}`).then(r => r.json());
    const branch = repo.default_branch || "main";
    let md = "";
    for (const name of ["README.md","readme.md","README.MD","Readme.md"]) {
      const res = await fetch(`https://raw.githubusercontent.com/${REPO}/${branch}/${name}`);
      if (res.ok) { md = await res.text(); break; }
    }
    if (!md) throw new Error("README not found");
    const rawBase = `https://raw.githubusercontent.com/${REPO}/${branch}/`;
    const html = DOMPurify.sanitize(marked.parse(md, { gfm:true, breaks:false }));
    const container = document.getElementById("readme");
    container.innerHTML = html;
    container.querySelectorAll("img").forEach(img => {
      const s = img.getAttribute("src") || "";
      if (!/^https?:/i.test(s) && !s.startsWith("data:")) img.src = new URL(s, rawBase).href;
    });
    container.querySelectorAll("a").forEach(a => {
      const h = a.getAttribute("href") || "";
      if (h.startsWith("#") || /^https?:/i.test(h) || h.startsWith("mailto:")) return;
      a.href = new URL(h, `https://github.com/${REPO}/blob/${branch}/`).href;
    });
  } catch (e) {
    document.getElementById("readme").innerHTML = `<p style="color:#b00">Could not load README: ${e.message}</p>`;
  }
}
init();
</script>
</body>
</html>
